        <h1>Contato</h1>

        <p>Se você deseja entrar em contato comigo para discutir um projeto ou solicitar um orçamento, por favor,
            preencha o formulário abaixo:</p>
        <hr style="width: 80%;">
        <br>

        <form action="mailto:vinyxd.meireles@gmail.com" method="post">
            <b><label for="nome">Nome Completo:</label></b>
            <br>
            <input type="text" id="nome" name="nome" required>
            <br>
            <br>

            <b><label for="tel">Telefone:</label><br></b>
            <input type="tel" id="tel" name="telefone">
            <br>
            <br>

            <b><label for="email">Email:</label><br></b>
            <input type="email" id="email" name="email" required>
            <br>
            <br>

            <b><label for="tipo"> Tipo de Pessoa?</label></b>
            <br>
            <select id="tipo" name="tipo">
                <option value="fisica">Física</option>
                <option value="juridica">Jurídica</option>
            </select>
            <br>
            <br>

            <b><label for="horario">Melhor horário para contato:</label></b>
            <br>
            <input type="time" id="horario" name="horario">
            <br>
            <br>

            <b><label for="">Selecione os tipos de serviço</label></b>
            <br>
            <br>
            <input type="checkbox" id="estatica" name="servicos[]" value="estatica">
            <label for="estatica">Página estática</label>
            <br>
            <label for="dinamica"><input type="checkbox" id="dinamica" name="servicos[]" value="dinamica">Página
                dinâmica</label><br>
            <label for="avancada"><input type="checkbox" id="avancada" name="servicos[]" value="avancada">Páginas
                avançadas</label><br><br>

            <b><label for="mensagem">Fale mais sobre o serviço desejado:</label></b>
            <br>
            <br>
            <textarea id="mensagem" name="mensagem" rows="5" cols="40" required></textarea><br><br>

            <input type="submit" value="Enviar">
    </center>

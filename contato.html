    <center>
        <h1>Contato</h1>

        <p>Se você deseja entrar em contato comigo para discutir um projeto ou solicitar um orçamento, por favor,
            preencha o formulário abaixo:</p>

        <form action="mailto:vinyxd.meireles@gmail.com" method="post">
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="tel">Telefone:</label><br>
            <input type="tel" id="tel" name="telefone"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="tipo"> Tipo de Pessoa?</label><br>
            <select id="tipo" name="tipo">
                <option value="fisica">Física</option>
                <option value="juridica">Jurídica</option>
            </select><br><br>

            <label for="horario">Melhor horário para contato:</label><br>
            <input type="time" id="horario" name="horario"><br><br>

            <label for="">Selecione o tipos de serviço</label><br>
            <input type="checkbox" id="estatica" name="servicos[]" value="estatica">
            <label for="estatica">Página estática</label><br>
            <label for="dinamica"><input type="checkbox" id="dinamica" name="servicos[]" value="dinamica">Página
                dinâmica</label><br>
            <label for="avancada"><input type="checkbox" id="avancada" name="servicos[]" value="avancada">Páginas
                avançadas</label><br><br>

            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" rows="5" cols="40" required></textarea><br><br>

            <input type="submit" value="Enviar">
    </center>
